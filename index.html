<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Happy 41st Birthday</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<canvas id="fireworks"></canvas>

<div id="balloons"></div>

<div id="sparkles"></div>



<div class="birthday">


<h1>
🎉 Happy 41st Birthday! 🎉
</h1>



<div class="cake">


<div class="candles">

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

</div>



<div class="layer top">
<div class="icing"></div>
</div>


<div class="layer middle">
<div class="icing"></div>
</div>


<div class="layer bottom">
<div class="icing"></div>
</div>


</div>





<button id="play">
🎂 Start Birthday Song 🎵
</button>



<div class="controls">

<button id="pause">
⏸️ Pause
</button>


<button id="resume">
▶️ Resume
</button>


</div>




<div class="age">

<span id="age">0</span> / 41 🎂

</div>



<div class="progress">

<div id="progress"></div>

</div>



</div>



<!-- Rainbow music visualizer -->

<div id="visualizer"></div>



<div id="finale">

<h2>
🎉 Happy 41st Birthday! 🎉
</h2>

</div>


<div id="confetti"></div>




<audio id="song">

<source src="birthday-song.mp3" type="audio/mpeg">

</audio>



<script src="script.js"></script>


</body>

</html>
