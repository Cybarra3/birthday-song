<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Happy 41st Birthday</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<canvas id="fireworks"></canvas>


<div id="balloons"></div>

<div id="sparkles"></div>



<div class="birthday">


<h1>
🎉 Happy 41st Birthday! 🎉
</h1>



<div class="cake">


<div class="candles">

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

<div class="candle">
<div class="flame"></div>
</div>

</div>



<div class="layer top">
<div class="frosting"></div>
</div>


<div class="layer middle">
<div class="frosting"></div>
</div>


<div class="layer bottom">
<div class="frosting"></div>
</div>



</div>





<button id="play">

🎂 Start Birthday Song 🎵

</button>




<div class="music">


<div class="age">

<span id="age">0</span> / 41 🎂

</div>



<div class="progress">

<div id="progress"></div>

</div>



<div class="presents">


<button id="pause">

🎁

</button>


<button id="resume">

🎁

</button>


</div>


</div>



<div id="visualizer"></div>



</div>




<audio id="song">

<source src="birthday-song.mp3" type="audio/mpeg">

</audio>



<script src="script.js"></script>


</body>

</html>
